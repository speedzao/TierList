<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TierList Insana - Ranqueando</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* VARIÁVEIS DE TEMA (CLARO / ESCURO) */
        :root {
            --primary-red: #e50914; /* Vermelho mais vibrante (estilo Netflix/Youtube) */
            --dark-red: #b20710;
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dcdde1;
            --row-border: #eeeeee;
            --hover-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #f5f6fa;
            --border-color: #333333;
            --row-border: #2d2d2d;
            --hover-bg: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* HEADER & ICONS */
        header {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .header-icons a, .theme-toggle {
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
        }

        .header-icons a:hover, .theme-toggle:hover {
            transform: scale(1.2) rotate(5deg);
        }

        .theme-toggle {
            background: none;
            border: none;
            outline: none;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button, .file-upload-label {
            background-color: var(--primary-red);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px; /* Mais arredondado, visual premium */
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover, .file-upload-label:hover {
            background-color: var(--dark-red);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.5);
        }

        button:active, .file-upload-label:active {
            transform: translateY(0);
        }

        input[type="file"] {
            display: none;
        }

        /* TIER LIST CONTAINER */
        #tier-list {
            width: 95%;
            max-width: 1200px;
            background: var(--container-bg);
            border: 3px solid var(--primary-red);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .tier-row {
            display: flex;
            border-bottom: 2px solid var(--row-border);
            min-height: 110px;
            position: relative;
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        /* TIER LABEL (Editável) */
        .tier-label {
            width: 130px;
            min-width: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: #111;
            text-align: center;
            padding: 10px;
            outline: none;
            text-transform: uppercase;
            word-break: break-word;
            border-right: 2px solid var(--container-bg);
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.1);
        }

        .tier-label:focus {
            background-image: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3));
        }

        .tier-items {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            padding: 15px;
            gap: 12px;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        /* ROW SETTINGS (Cor e Deletar) */
        .row-settings {
            width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border-left: 2px solid var(--row-border);
            background-color: var(--hover-bg);
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: none;
            padding: 5px;
            opacity: 0.6;
            transition: opacity 0.3s, color 0.3s, transform 0.2s;
        }

        .btn-icon:hover {
            opacity: 1;
            transform: scale(1.2);
            background: none;
            box-shadow: none;
        }

        .btn-delete:hover {
            color: var(--primary-red);
        }

        /* Input de cor invisível sob o ícone de paleta */
        .color-picker-wrapper {
            position: relative;
            display: inline-block;
        }

        .color-picker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* BANCO DE IMAGENS */
        #item-bank {
            width: 95%;
            max-width: 1200px;
            min-height: 180px;
            background: var(--container-bg);
            border: 3px dashed var(--border-color);
            border-radius: 16px;
            margin-top: 40px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
        }

        #item-bank:empty::before {
            content: 'As imagens recortadas aparecerão aqui. Arraste-as para a Tier List!';
            color: #888;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .draggable-item {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            cursor: grab;
            border: 3px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .draggable-item:hover {
            transform: scale(1.08) translateY(-5px);
            border-color: var(--primary-red);
            box-shadow: 0 8px 15px rgba(229, 9, 20, 0.4);
        }

        .draggable-item:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        /* MODAL DE RECORTE */
        #crop-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid var(--primary-red);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: var(--text-color);
            font-weight: 800;
            text-transform: uppercase;
        }

        .img-container {
            max-width: 800px;
            max-height: 50vh;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
        }

        .img-container img {
            max-width: 100%;
        }

        .modal-actions {
            display: flex;
            gap: 20px;
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            box-shadow: none;
        }
        
        .btn-cancel:hover {
            background-color: var(--border-color);
            color: #111;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header>
        <h1>TierList</h1>
        <div class="header-icons">
            <a href="https://discord.gg/3hc77YwU2z" title="Nosso Discord"><i class="fa-brands fa-discord"></i></a>
            <a href="https://www.youtube.com/@speedewak" title="Nosso YouTube"><i class="fa-brands fa-youtube"></i></a>
            <button class="theme-toggle" id="theme-btn" title="Mudar Tema">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="controls">
        <label class="file-upload-label">
            <i class="fa-solid fa-upload"></i> Adicionar Imagem
            <input type="file" id="image-upload" accept="image/*">
        </label>
        <button id="add-row-btn"><i class="fa-solid fa-plus"></i> Nova Categoria</button>
    </div>

    <div id="tier-list"></div>

    <div id="item-bank" class="tier-items"></div>

    <div id="crop-modal">
        <div class="modal-content">
            <h2>Recorte sua imagem</h2>
            <div class="img-container">
                <img id="image-to-crop" src="">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancel-crop">Cancelar</button>
                <button id="confirm-crop"><i class="fa-solid fa-check"></i> Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // --- TEMA CLARO/ESCURO ---
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = themeBtn.querySelector('i');
        
        // Checa se já tem tema salvo no PC do cara
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        themeBtn.addEventListener('click', () => {
            let theme = document.body.getAttribute('data-theme');
            if (theme === 'dark') {
                document.body.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                updateThemeIcon('light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                updateThemeIcon('dark');
            }
        });

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fa-solid fa-sun';
                themeIcon.style.color = '#f1c40f'; // Amarelo no sol
            } else {
                themeIcon.className = 'fa-solid fa-moon';
                themeIcon.style.color = 'white';
            }
        }

        // --- VARIÁVEIS GLOBAIS ---
        let cropper;
        let draggedItem = null;
        const imageUpload = document.getElementById('image-upload');
        const cropModal = document.getElementById('crop-modal');
        const imageToCrop = document.getElementById('image-to-crop');
        const confirmCropBtn = document.getElementById('confirm-crop');
        const cancelCropBtn = document.getElementById('cancel-crop');
        const itemBank = document.getElementById('item-bank');
        const addRowBtn = document.getElementById('add-row-btn');
        const tierList = document.getElementById('tier-list');

        // Tiers Padrão
        const defaultTiers = [
            { label: 'S', color: '#ff7f7f' },
            { label: 'A', color: '#ffbf7f' },
            { label: 'B', color: '#ffff7f' },
            { label: 'C', color: '#7fff7f' },
            { label: 'D', color: '#7fbfff' }
        ];

        // Inicializa as categorias
        defaultTiers.forEach(tier => createTierRow(tier.label, tier.color));

        // --- SISTEMA DE UPLOAD E RECORTE (CROP) ---
        imageUpload.addEventListener('change', function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const file = files[0];
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    imageToCrop.src = event.target.result;
                    cropModal.style.display = 'flex';
                    
                    if (cropper) cropper.destroy();
                    
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1, // Mantém quadrado
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 0.8,
                        background: false
                    });
                };
                reader.readAsDataURL(file);
                imageUpload.value = ''; 
            }
        });

        cancelCropBtn.addEventListener('click', () => {
            cropModal.style.display = 'none';
            if (cropper) cropper.destroy();
        });

        confirmCropBtn.addEventListener('click', () => {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas({ width: 150, height: 150 });
            const croppedImageSrc = canvas.toDataURL('image/png');

            const newImg = document.createElement('img');
            newImg.src = croppedImageSrc;
            newImg.className = 'draggable-item';
            newImg.draggable = true;
            newImg.id = 'item-' + Date.now();

            setupDragEvents(newImg);
            itemBank.appendChild(newImg);

            cropModal.style.display = 'none';
            cropper.destroy();
        });

        // --- SISTEMA DE ARRASTAR E SOLTAR (DRAG & DROP) ---
        function setupDragEvents(item) {
            item.addEventListener('dragstart', function(e) {
                draggedItem = this;
                setTimeout(() => this.style.opacity = '0.4', 0);
            });

            item.addEventListener('dragend', function() {
                setTimeout(() => {
                    this.style.opacity = '1';
                    draggedItem = null;
                }, 0);
            });
        }

        function setupDropZone(zone) {
            zone.addEventListener('dragover', function(e) {
                e.preventDefault(); 
                this.style.backgroundColor = 'rgba(229, 9, 20, 0.1)';
            });

            zone.addEventListener('dragleave', function() {
                this.style.backgroundColor = 'transparent';
            });

            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.backgroundColor = 'transparent';
                if (draggedItem) {
                    this.appendChild(draggedItem);
                }
            });
        }

        setupDropZone(itemBank);

        // --- CRIAÇÃO E GERENCIAMENTO DE LINHAS ---
        addRowBtn.addEventListener('click', () => {
            createTierRow('NOVO', '#a8a8a8');
        });

        function createTierRow(labelText, color) {
            const row = document.createElement('div');
            row.className = 'tier-row';

            // 1. Label da Categoria
            const label = document.createElement('div');
            label.className = 'tier-label';
            label.contentEditable = true;
            label.innerText = labelText;
            label.style.backgroundColor = color;


            // 2. Área de Itens (DropZone)
            const itemsArea = document.createElement('div');
            itemsArea.className = 'tier-items';
            setupDropZone(itemsArea);

            // 3. Controles da Linha (Cor e Deletar)
            const settingsArea = document.createElement('div');
            settingsArea.className = 'row-settings';

            // Picker de Cor
            const colorWrapper = document.createElement('div');
            colorWrapper.className = 'color-picker-wrapper';
            colorWrapper.innerHTML = `<button class="btn-icon" title="Mudar Cor"><i class="fa-solid fa-palette"></i></button>`;
            
            const colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.className = 'color-picker';
            colorInput.value = color;
            
            colorInput.addEventListener('input', (e) => {
                label.style.backgroundColor = e.target.value;
            });

            colorWrapper.appendChild(colorInput);

            // Botão Deletar
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-icon btn-delete';
            deleteBtn.title = 'Deletar Categoria';
            deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
            
            deleteBtn.addEventListener('click', () => {
                // Se a linha tiver imagens, joga elas pro banco de itens antes de deletar!
                const itemsInside = itemsArea.querySelectorAll('.draggable-item');
                itemsInside.forEach(item => itemBank.appendChild(item));
                
                // Animaçãozinha antes de sumir
                row.style.opacity = '0';
                setTimeout(() => row.remove(), 300);
            });

            settingsArea.appendChild(colorWrapper);
            settingsArea.appendChild(deleteBtn);

            // Monta a linha
            row.appendChild(label);
            row.appendChild(itemsArea);
            row.appendChild(settingsArea);

            tierList.appendChild(row);
        }
    </script>
</body>
</html>
